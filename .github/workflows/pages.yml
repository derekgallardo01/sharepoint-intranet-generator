name: Deploy live demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Generate Meridian Advisory (default) into out/meridian
        run: python cli.py generate site-definition.json --out out/meridian
      - name: Generate Acme Manufacturing (alternate) into out/acme
        run: python cli.py generate examples/site-definition-acme-manufacturing.json --out out/acme
      - name: Create the top-level demos landing page
        run: |
          cat > out/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en"><head><meta charset="utf-8">
          <title>SharePoint intranet generator — live demos</title>
          <style>
            body{font-family:Segoe UI,Arial,sans-serif;max-width:720px;margin:3rem auto;padding:0 1.5rem;color:#222;background:#f3f4f6}
            h1{font-size:1.5rem;margin-bottom:.5rem}
            .lead{color:#555;font-size:.95rem;margin-top:0}
            a{color:#1f5673}
            .card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:1rem 1.25rem;margin:1rem 0}
            .card h2{margin:0 0 .35rem;font-size:1.1rem}
            .card p{margin:.35rem 0;color:#555;font-size:.95rem}
            .meta{color:#888;font-size:.85rem;margin-top:2rem}
            code{background:#eef0f3;padding:1px 6px;border-radius:4px;font-size:.9em}
          </style>
          </head><body>
          <h1>SharePoint intranet generator</h1>
          <p class="lead">Generate a complete modern intranet from a single <code>site-definition.json</code>.
          Two worked definitions are rendered live below.</p>

          <div class="card">
            <h2><a href="./meridian/index.html">Meridian Advisory</a> — professional services</h2>
            <p>HR, IT, Policies sections + FAQ + People directory + Document Center.</p>
          </div>

          <div class="card">
            <h2><a href="./acme/index.html">Acme Manufacturing</a> — manufacturing</h2>
            <p>Production, Quality, Supply Chain, Engineering + Plant FAQ + Plant directory + Document Center with SOPs / drawings / supplier contracts.</p>
          </div>

          <p class="meta">Both generated by <code>python cli.py generate &lt;definition.json&gt;</code> on every push.
          Source: <a href="https://github.com/derekgallardo01/sharepoint-intranet-generator">github.com/derekgallardo01/sharepoint-intranet-generator</a></p>
          </body></html>
          EOF
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out
      - id: deployment
        uses: actions/deploy-pages@v4
